<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Calculator</h1>
    <div class="calculator" role="application" aria-label="Simple calculator">
      <input id="display" class="display" type="text" value="0" aria-label="Calculator display" readonly />

      <div class="keys">
        <button data-action="clear" class="btn btn-fn">C</button>
        <button data-action="delete" class="btn btn-fn">DEL</button>
        <button data-value="%" class="btn btn-op">%</button>
        <button data-value="/" class="btn btn-op">÷</button>

        <button data-value="7" class="btn">7</button>
        <button data-value="8" class="btn">8</button>
        <button data-value="9" class="btn">9</button>
        <button data-value="*" class="btn btn-op">×</button>

        <button data-value="4" class="btn">4</button>
        <button data-value="5" class="btn">5</button>
        <button data-value="6" class="btn">6</button>
        <button data-value="-" class="btn btn-op">−</button>

        <button data-value="1" class="btn">1</button>
        <button data-value="2" class="btn">2</button>
        <button data-value="3" class="btn">3</button>
        <button data-value="+" class="btn btn-op">+</button>

        <button data-value="0" class="btn btn-wide">0</button>
        <button data-value="." class="btn">.</button>
        <button data-action="equals" class="btn btn-eq">=</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
